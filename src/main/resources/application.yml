# Production target: MySQL 8. The schema (tables, indexes, unique constraints) is
# generated from the JPA entity annotations by Hibernate — there are no hand-written
# SQL migrations (no Flyway). See docs/exception-strategy.md and the @Table/@Index
# annotations on the domain entities.
spring:
  datasource:
    url: ${PIPELINE_DB_URL:jdbc:mysql://localhost:3306/pipeline}
    username: ${PIPELINE_DB_USER:pipeline}
    password: ${PIPELINE_DB_PASSWORD:pipeline}
  cloud:
    openfeign:
      client:
        config:
          infra-manager:
            connectTimeout: 3000
            # apiCallTimeout(데코레이터)보다 넉넉하게 — 호출별 타임아웃은 데코레이터가 소유한다.
            readTimeout: ${INFRA_MANAGER_READ_TIMEOUT:60000}
            loggerLevel: basic
  jpa:
    open-in-view: false
    hibernate:
      # 'update' lets Hibernate create/extend the schema from the entities for the demo.
      # A production deployment would switch this to 'validate' once the schema is frozen.
      ddl-auto: update
    properties:
      hibernate.jdbc.time_zone: UTC

# Per-task deadline defaults (domain; ADR-016).
pipeline:
  execution-timeout: PT50M    # TERRAFORM_JOB per-task deadline
  time-to-live: P7D           # CONDITION_CHECK per-task deadline
  polling-interval: PT10M     # poll re-check cadence
  max-fail-count: 2           # attempts before a task is FAILED

  # ADR-021 execution model. Static server config, tuned in operation against observed InfraManager
  # latency. Hard constraint (Decision 5): lease-duration > api-call-timeout (+ pool queue wait +
  # margin, the latter two tuned operationally). worker-per-pod sizes BOTH the worker pool and the
  # per-call timeout pool. Soft caps overshoot by up to C-1 by design.
  execution:
    worker-per-pod: 4
    lease-duration: PT2M
    api-call-timeout: PT30S
    running-pipeline-cap: 100   # soft: concurrently-claimed pipelines
    terraform-slot-cap: 20                # soft: concurrent TF-dispatch occupancy
    terraform-slot-retry: PT30S
    poll-interval: PT1S
    max-idle-sleep: PT5S
    backoff-base: PT0.2S
    backoff-max: PT5S
    jitter-ratio: 0.2
    scheduler-initial-delay: PT5S

# InfraManager 프로덕션 HTTP delegate. base-url·auth-token 은 필수 설정이다 — 도메인이 InfraManagerClient 를
# 필수 주입받으므로 full 컨텍스트는 이 연동 없이는 못 뜬다(FeignConfig 참조). 값은 env 로 주입한다:
#   INFRA_MANAGER_BASE_URL(없으면 @FeignClient url 해석 실패), INFRA_MANAGER_TOKEN(비면 인터셉터가 fail-fast).
# base-url 은 여기 기본값을 두지 않는다(누락 시 시작 실패로 명시적 요구). 슬라이스 테스트는 fake 를 직접 주입한다.
infra-manager:
  # base-url 은 기본값 없이 env(INFRA_MANAGER_BASE_URL)로만 — 미설정 시 @FeignClient 가 시작에서 명확히 실패한다.
  auth-token: ${INFRA_MANAGER_TOKEN:}
