# Production target: MySQL 8. The schema (tables, indexes, unique constraints) is
# generated from the JPA entity annotations by Hibernate — there are no hand-written
# SQL migrations (no Flyway). See docs/exception-strategy.md and the @Table/@Index
# annotations on the domain entities.
spring:
  datasource:
    url: ${PIPELINE_DB_URL:jdbc:mysql://localhost:3306/pipeline}
    username: ${PIPELINE_DB_USER:pipeline}
    password: ${PIPELINE_DB_PASSWORD:pipeline}
  cloud:
    openfeign:
      client:
        config:
          infra-manager:
            connectTimeout: 3000
            # apiCallTimeout(데코레이터)보다 넉넉하게 — 호출별 타임아웃은 데코레이터가 소유한다.
            readTimeout: ${INFRA_MANAGER_READ_TIMEOUT:60000}
            loggerLevel: basic
  jpa:
    open-in-view: false
    hibernate:
      # 'update' lets Hibernate create/extend the schema from the entities for the demo.
      # A production deployment would switch this to 'validate' once the schema is frozen.
      ddl-auto: update
    properties:
      hibernate.jdbc.time_zone: UTC

# Per-task deadline defaults (domain; ADR-016).
pipeline:
  execution-timeout: PT50M    # TERRAFORM_JOB per-task deadline
  polling-interval: PT10M     # poll re-check cadence (CONDITION_CHECK retry spacing)
  max-fail-count: 2           # attempts before a task is FAILED (also bounds CONDITION_CHECK not-met polls)
  start-delay: PT15S          # LIN-17: wait after creation before the first task dispatches (0 = immediate)

  # ADR-021 execution model. Static server config, tuned in operation against observed InfraManager
  # latency. Hard constraint (Decision 5): lease-duration > api-call-timeout (+ pool queue wait +
  # margin, the latter two tuned operationally). worker-per-pod sizes BOTH the worker pool and the
  # per-call timeout pool. Soft caps overshoot by up to C-1 by design.
  execution:
    worker-per-pod: 4
    lease-duration: PT2M
    api-call-timeout: PT30S
    running-pipeline-cap: 100   # soft: concurrently-claimed pipelines
    terraform-slot-cap: 20                # soft: concurrent TF-dispatch occupancy
    terraform-slot-retry: PT30S
    poll-interval: PT1S
    max-idle-sleep: PT5S
    backoff-base: PT0.2S
    backoff-max: PT5S
    jitter-ratio: 0.2
    scheduler-initial-delay: PT5S

  # ADR-022 종단 상태 알림(notify). 실행 워커풀과 격리된 단일 스레드 loop의 케이던스·backoff·lease.
  # Hard constraint: lease-duration > call-timeout (NotifySettings가 fail-fast로 강제).
  # 전달 채널은 env로 주입한다(오너 결정 2026-07-09 — admin 채널 관리 없음). 기본은 꺼짐이며, 켜는
  # 배포는 env 3종(PIPELINE_NOTIFY_ENABLED=true, PIPELINE_NOTIFY_SLACK_WEBHOOK_URL, enabled-after)을
  # 함께 제공해야 한다 — enabled=true인데 webhook/enabled-after가 없으면 NotifySettings가 시작에 실패한다.
  notify:
    enabled: ${PIPELINE_NOTIFY_ENABLED:false}
    # Slack Incoming Webhook URL — secret이므로 env로만 주입하고 로그에 찍지 않는다.
    slack-webhook-url: ${PIPELINE_NOTIFY_SLACK_WEBHOOK_URL:}
    # enabled-after: 알림 도입 시점 컷오프(ISO-8601 Instant, 예: 2026-07-09T00:00:00Z).
    # PIPELINE_NOTIFY_ENABLED=true 시 필수 — claim 술어가 last_activity_at >= enabled-after를 요구해
    # 도입 전에 종단된 레거시 행의 소급 발화 폭주를 막는다(ADR-022 §5 대안: 활성 컷오프 술어).
    # 키를 주석으로 두는 이유: 빈 문자열 기본값(${...:})은 Instant 바인딩을 깨고, 1970-01-01 같은
    # sentinel 기본값은 컷오프를 무력화해 레거시 종단 전부를 발화시킨다 — enabled=true 배포가
    # env(PIPELINE_NOTIFY_ENABLEDAFTER)나 yml 오버라이드로 실제 도입 시각을 명시 제공해야 한다.
    # enabled-after: 2026-07-09T00:00:00Z
    poll-interval: PT2S            # 일감 있을 때 loop 케이던스
    max-idle-sleep: PT10S          # 빈 sweep backoff 상한
    backoff-base: PT5S             # 전달 실패 backoff 기준(지수)
    backoff-max: PT10M
    jitter-ratio: 0.2
    lease-duration: PT1M           # notify claim lease (> call-timeout 강제)
    call-timeout: PT10S            # Slack HTTP read timeout
    max-attempts: 8                # 이 횟수 실패하면 자동 재시도 중단 → 운영 에스컬레이션
    scheduler-initial-delay: PT10S

# InfraManager 프로덕션 HTTP delegate. base-url·auth-token 은 필수 설정이다 — 도메인이 InfraManagerClient 를
# 필수 주입받으므로 full 컨텍스트는 이 연동 없이는 못 뜬다(FeignConfig 참조). 값은 env 로 주입한다:
#   INFRA_MANAGER_BASE_URL(없으면 @FeignClient url 해석 실패), INFRA_MANAGER_TOKEN(비면 인터셉터가 fail-fast).
# base-url 은 여기 기본값을 두지 않는다(누락 시 시작 실패로 명시적 요구). 슬라이스 테스트는 fake 를 직접 주입한다.
infra-manager:
  # base-url 은 기본값 없이 env(INFRA_MANAGER_BASE_URL)로만 — 미설정 시 @FeignClient 가 시작에서 명확히 실패한다.
  auth-token: ${INFRA_MANAGER_TOKEN:}
