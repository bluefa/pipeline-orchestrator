# Production target: MySQL 8. The schema (tables, indexes, unique constraints) is
# generated from the JPA entity annotations by Hibernate — there are no hand-written
# SQL migrations (no Flyway). See docs/exception-strategy.md and the @Table/@Index
# annotations on the domain entities.
spring:
  datasource:
    url: ${PIPELINE_DB_URL:jdbc:mysql://localhost:3306/pipeline}
    username: ${PIPELINE_DB_USER:pipeline}
    password: ${PIPELINE_DB_PASSWORD:pipeline}
  jpa:
    open-in-view: false
    hibernate:
      # 'update' lets Hibernate create/extend the schema from the entities for the demo.
      # A production deployment would switch this to 'validate' once the schema is frozen.
      ddl-auto: update
    properties:
      hibernate.jdbc.time_zone: UTC

# Per-task deadline defaults (the ADR-021 runner owns the tick cadence and per-call timeout).
pipeline:
  execution-timeout: PT50M    # TERRAFORM_JOB per-task deadline
  time-to-live: P7D           # CONDITION_CHECK per-task deadline
  polling-interval: PT10M     # poll re-check cadence
  max-fail-count: 2           # attempts before a task is FAILED
